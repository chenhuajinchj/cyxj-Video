    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ── Seeded PRNG（mulberry32）替代 Math.random，确保确定性渲染 ──
        function mulberry32(seed) {
          let s = seed >>> 0;
          return function () {
            s = (s + 0x6D2B79F5) >>> 0;
            let t = s;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        // 中文 scramble 池
        const SCRAMBLE_POOL = "审美设计颜色排版字号间距圆角阴影留白形态克制".split("");

        // ── 准备 scramble target：填充随机初始字符（seed=42） ──
        const scrambleEl = document.getElementById("b1-scramble-target");
        const finalText = (scrambleEl && scrambleEl.dataset.final) || "零容忍";
        const finalArr = finalText.split("");
        if (scrambleEl) {
          const initRng = mulberry32(42);
          while (scrambleEl.firstChild) scrambleEl.removeChild(scrambleEl.firstChild);
          finalArr.forEach(() => {
            const span = document.createElement("span");
            span.className = "b1-sch";
            span.textContent = SCRAMBLE_POOL[Math.floor(initRng() * SCRAMBLE_POOL.length)];
            scrambleEl.appendChild(span);
          });
        }
        const scrambleSpans = scrambleEl ? scrambleEl.querySelectorAll(".b1-sch") : [];

        // ============ TIMELINE ============

        // 0.00s — Kicker 滑入
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-kicker',
          { x: -20, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.0);

        // ── 句 1（0.05s–1.30s）"作为设计师出身的我" ──
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-line-1 .b1-char',
          { y: 28, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.07, duration: 0.45, ease: "power3.out" },
          0.05);

        // 1.30s — 句 1 fade + 上飘
        tl.to('[data-composition-id="beat-1-hook"] .b1-line-1',
          { y: -40, opacity: 0, duration: 0.35, ease: "power2.in" },
          1.30);

        // ── 句 2（1.55s–3.55s）"对这种 AI 默认的审美" + "零容忍" scramble ──
        tl.set('[data-composition-id="beat-1-hook"] .b1-line-2', { opacity: 1 }, 1.55);
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-line-2 .b1-line-2-prefix .b1-char',
          { y: 28, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.06, duration: 0.42, ease: "power3.out" },
          1.55);

        // 2.25s — "零容忍" scramble（GSAP onUpdate 替代 requestAnimationFrame）
        const scrambleObj = { p: 0 };
        tl.to(scrambleObj, {
          p: 1,
          duration: 0.8,
          ease: "none",
          onUpdate() {
            const settled = scrambleObj.p * finalArr.length;
            // 用 progress 离散化 seed，保证同 progress 同输出（确定性）
            const frameSeed = 100 + Math.floor(scrambleObj.p * 60);
            const rng = mulberry32(frameSeed);
            for (let i = 0; i < scrambleSpans.length; i++) {
              if (i <= settled) {
                scrambleSpans[i].textContent = finalArr[i];
              } else {
                scrambleSpans[i].textContent =
                  SCRAMBLE_POOL[Math.floor(rng() * SCRAMBLE_POOL.length)];
              }
            }
          }
        }, 2.25);

        // 3.10s — "零容忍" 下方 lime 横划线展开
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-scramble-underline',
          { scaleX: 0 },
          { scaleX: 1, duration: 0.45, ease: "expo.out" },
          3.10);

        // 3.10s — "零容忍" shake-error 抖动（main commit 7ad93ef 组件思路 1:1 移植）
        //   通过 onStart 加 class 触发 CSS @keyframes，onComplete 删 class 复位
        tl.to({}, {
          duration: 0.6,
          onStart() {
            const el = document.querySelector('[data-composition-id="beat-1-hook"] .b1-scramble');
            if (el) el.classList.add("is-shaking");
          },
          onComplete() {
            const el = document.querySelector('[data-composition-id="beat-1-hook"] .b1-scramble');
            if (el) el.classList.remove("is-shaking");
          }
        }, 3.10);

        // 3.55s — 句 2 整体 fade + 上飘
        tl.to('[data-composition-id="beat-1-hook"] .b1-line-2',
          { y: -50, opacity: 0, duration: 0.3, ease: "power2.in" },
          3.55);

        // ── 句 3（3.85s 起）"而这些是我通过工作流跑出来的" ──
        // y: -260 把 hero 完全推到画布上半（中心 ~280px），给卡片让出 200px+ 空白
        tl.set('[data-composition-id="beat-1-hook"] .b1-line-3', { opacity: 1 }, 3.85);
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-line-3',
          { y: 20 },
          { y: -260, duration: 0.7, ease: "power3.out" },
          3.85);
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-line-3 .b1-char',
          { y: 18, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.05, duration: 0.4, ease: "power3.out" },
          3.85);

        // ── 3 张作品占位卡（4.0s 起，错开 0.25s）──
        tl.to('[data-composition-id="beat-1-hook"] .b1-gallery',
          { opacity: 1, duration: 0.01 },
          4.0);
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-card',
          { y: 60, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.25, duration: 0.6, ease: "power3.out" },
          4.0);

        // ── chip 1（6.10s）"一个比一个简单" ──
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-chip-1',
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "back.out(1.3)" },
          6.10);

        // ── chip 2（7.15s）"一个比一个好看" + pulse ──
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-chip-2',
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "back.out(1.3)" },
          7.15);
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-chip-2',
          { scale: 1 },
          { scale: 1.06, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 },
          7.55);

        // 时长锚点
        tl.to({}, { duration: 8.3 }, 0);
        window.__timelines["beat-1-hook"] = tl;
      })();
    </script>
  </div>
</template>
