    <script>
      (() => {

        const tl = gsap.timeline({ paused: true });

        // 0.00s — Kicker
        tl.fromTo('[data-composition-id="beat-12-s3result"] .b12-kicker',
          { x: -20, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
          0.0);

        // 0.0s — top meta
        tl.fromTo('[data-composition-id="beat-12-s3result"] .b12-top-meta',
          { y: 10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
          0.0);

        // 0.15s — time stat（"五六分钟"对应）
        tl.fromTo('[data-composition-id="beat-12-s3result"] .b12-stat[data-stat="time"]',
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.55, ease: "back.out(1.3)" },
          0.15);

        // 2.5s — variety stat（"快更丰富"对应）
        tl.fromTo('[data-composition-id="beat-12-s3result"] .b12-stat[data-stat="variety"]',
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.3)" },
          2.5);

        // 4.7s — beauty stat（"更好看"对应）

          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.3)" },
          4.7);

        // 5.0s — beauty 5 ★ stagger
        [0, 1, 2, 3, 4].forEach((i) => {
          tl.call(() => {
            const stars = document.querySelectorAll('[data-composition-id="beat-12-s3result"] .b12-stat-star');
            if (stars[i]) stars[i].classList.add("is-on");
          }, [], 5.0 + i * 0.14);
        });

        // 5.5s — token stat（"TOKEN 还少"对应）
        tl.fromTo('[data-composition-id="beat-12-s3result"] .b12-stat[data-stat="token"]',
          { y: 24, opacity: 0 },

        // 时长锚点
        tl.to({}, { duration: 12.0 }, 0);
        window.__timelines["beat-12-s3result"] = tl;
