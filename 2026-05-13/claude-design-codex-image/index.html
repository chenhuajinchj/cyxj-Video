<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AI 生图工作流复盘 · 三阶段</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
      }

      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }

      /* ── 全局极淡颗粒（克制感）—— 浅米底上的呼吸 ── */
      #global-grain {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 8;
        opacity: 0;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(11, 11, 8, 0.015) 1px, transparent 2px),
          radial-gradient(circle at 80% 70%, rgba(11, 11, 8, 0.012) 1px, transparent 2px);
        background-size: 3px 3px, 5px 5px;
        mix-blend-mode: multiply;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ai-image-workflow-3stages"
      data-start="0"
      data-duration="8.3"
      data-width="1920"
      data-height="1080"
    >
      <!-- 全局极淡颗粒 -->
      <div id="global-grain"></div>

      <!-- ─────────────────────────────────────────────────────────
           BEAT 1 [0 → 8.3s] HOOK
           SRT 切分（5 句）：
             0.00–1.43  作为设计师出身的我
             1.43–3.70  对这种 AI 默认的审美零容忍
             3.73–6.00  而这些是我通过工作流跑出来的
             6.03–7.13  一个比一个简单
             7.13–8.23  一个比一个好看
           视觉锚点：宋体大字 hero + "零容忍" hyper-text scramble + 3 作品占位卡
           hot 色：lime（仅 "零容忍" pill 和"一个比一个好看"chip）
           ───────────────────────────────────────────────────────── -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="8.3"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // 全局颗粒慢慢浮现（仅 0.5s 后亮起，全程在）
      mainTl.to("#global-grain",
        { opacity: 1, duration: 0.8, ease: "power2.out" },
        0.5);

      // 时长锚点
      mainTl.to({}, { duration: 8.3 }, 0);
      window.__timelines["ai-image-workflow-3stages"] = mainTl;
    </script>
  </body>
</html>
